services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cr-management-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-cr_password}
      MYSQL_DATABASE: ${DB_DATABASE:-cr_management}
      MYSQL_USER: ${DB_USERNAME:-cr_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cr_password}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backend/backup:/backup
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD:-cr_password}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cr-network

  # Backend API - Development Mode (Hot-reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cr-management-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-8080}
      API_PREFIX: ${API_PREFIX:-/api}

      # Database
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-cr_user}
      DB_PASSWORD: ${DB_PASSWORD:-cr_password}
      DB_DATABASE: ${DB_DATABASE:-cr_management}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}

      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your_access_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_refresh_secret_change_in_production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      # Upload
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      ALLOWED_FILE_TYPES: ${ALLOWED_FILE_TYPES:-image/jpeg,image/png,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # Bind mount entire backend directory for hot-reload
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - cr-network

  # Frontend - Development Mode (Vite Hot Module Replacement)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cr-management-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8080/api}
      VITE_USE_MOCK: ${VITE_USE_MOCK:-false}
      VITE_APP_NAME: ${VITE_APP_NAME:-CR Management System}
      VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      # Bind mount entire frontend directory for hot-reload
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cr-network

volumes:
  mysql_data:
    driver: local

networks:
  cr-network:
    driver: bridge
